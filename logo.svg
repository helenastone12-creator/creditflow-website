<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 54" width="210" height="54">
  <!-- Icon mark: green rounded square -->
  <rect x="0" y="5" width="44" height="44" rx="10" fill="#00C896"/>
  <!-- Letter F: vertical bar -->
  <rect x="12" y="15" width="4.5" height="24" rx="2.25" fill="#0B1F45"/>
  <!-- Letter F: top horizontal bar -->
  <rect x="12" y="15" width="21" height="4.5" rx="2.25" fill="#0B1F45"/>
  <!-- Letter F: middle horizontal bar -->
  <rect x="12" y="25" width="14" height="4.5" rx="2.25" fill="#0B1F45"/>
  <!-- Wordmark: Fin (navy) + ooz (green) -->
  <text x="56" y="40" font-family="'Sora','Arial',sans-serif" font-weight="800" font-size="30" letter-spacing="-0.5">
    <tspan fill="#0B1F45">Fin</tspan><tspan fill="#00C896">ooz</tspan>
  </text>
</svg>
